name: Update Check

on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 18 * * *'  # daily 18:00 UTC

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Generate types
        id: generate
        run: pnpm ts-node scripts/generate.ts --ci

      - name: Check for generated changes
        id: check
        run: |
          if git diff --quiet src/generated; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update generated API types'
          branch: update/generated-types
          title: 'chore: update generated API types'
          body: |
            This PR bumps the generated API code.
            Please review and adjust codebase as needed for new definitions.
