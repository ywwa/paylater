name: Update Check

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 18 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install
      - run: pnpm ts-node scripts/generate.ts --ci